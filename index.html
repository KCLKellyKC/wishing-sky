<!doctype html><html lang="zh-Hant"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"><meta name="theme-color" content="#0B132B"><meta name="apple-mobile-web-app-capable" content="yes"><title>Midnight Wishing Sky</title><link rel="manifest" href="manifest.webmanifest"><link rel="apple-touch-icon" href="icon-192.png"><link rel="stylesheet" href="style.css"></head><body data-theme="midnight"><div class="aurora"></div><canvas id="sky"></canvas><canvas id="wishes"></canvas><header class="top"><button id="install" class="pill hidden">安裝</button><button id="sound" class="pill">靜心音</button><button id="journalBtn" class="pill">日記</button><button id="syncBtn" class="pill">同步</button><button id="reviewBtn" class="pill">年度回顧</button><button id="shareBtn" class="pill">分享卡</button><select id="theme" class="pill"><option value="midnight">深夜藍</option><option value="mist">晨霧白</option><option value="forest">森林綠</option><option value="rose">玫瑰夜空</option></select></header><div id="status" class="status">準備連線</div><div id="toast" class="toast hidden"></div><p class="hint">點一下夜空，種下一顆心願星星</p><section id="wishBox" class="glass modal hidden"><h1>此刻你想放下或許下什麼？</h1><p>選一種心情，寫一句話。內容會同步到 Supabase，手機與電腦共用同一片星空。</p><div id="moods" class="chips"></div><input id="wishText" maxlength="88" placeholder="例如：願明天的我更輕盈一點"><div class="row"><button id="send" class="primary">送出</button><button id="cancel" class="pill">先不寫</button></div></section><aside id="journal" class="glass side hidden"><div class="head"><h2>星空日記</h2><button id="closeJournal" class="icon">×</button></div><div class="tabs"><button class="tab active" data-tab="stats">統計</button><button class="tab" data-tab="calendar">月曆</button><button class="tab" data-tab="ach">成就</button><button class="tab" data-tab="cloud">雲端</button></div><section id="stats" class="page show"></section><section id="calendar" class="page"></section><section id="ach" class="page"></section><section id="cloud" class="page"><div class="card"><strong>Supabase 即時同步</strong><p id="cloudText">正在初始化匿名登入...</p><button id="forceSync" class="wide pill">立即同步</button></div><div class="card"><strong>備份搬家</strong><button id="export" class="wide pill">匯出 JSON</button><label class="wide pill file">匯入 JSON<input id="import" type="file" accept=".json,application/json" hidden></label></div><button id="clear" class="wide danger">清空本機快取</button></section></aside><section id="story" class="glass story hidden"><button id="closeStory" class="icon">×</button><h2 id="storyTitle">你的星座故事</h2><p id="storyText"></p></section><script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script><script src="config.js"></script><script src="app.js" defer></script></body></html>
