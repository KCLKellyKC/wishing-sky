<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#0B132B" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="許願星空" />
  <title>深夜許願星空 PWA</title>
  <link rel="manifest" href="manifest.webmanifest" />
  <link rel="apple-touch-icon" href="icon-192.png" />
  <link rel="stylesheet" href="style.css" />
</head>
<body data-theme="midnight">
  <div class="aurora" aria-hidden="true"></div>
  <div class="aurora-ribbon" aria-hidden="true"></div>
  <canvas id="bgCanvas"></canvas>
  <canvas id="wishCanvas"></canvas>
  <canvas id="sceneCanvas"></canvas>

  <header class="topbar" aria-label="主要控制列">
    <button id="installBtn" class="pill hidden" type="button">安裝 App</button>
    <button id="soundToggle" class="pill" type="button">播放靜心音</button>
    <button id="breathToggle" class="pill" type="button">呼吸引導</button>
    <button id="statsToggle" class="pill" type="button">星空日記</button>
    <select id="themeSelect" class="theme-select" aria-label="選擇星空主題">
      <option value="midnight">深夜藍</option>
      <option value="mist">晨霧白</option>
      <option value="forest">森林綠</option>
      <option value="rose">玫瑰夜空</option>
    </select>
  </header>

  <main class="sr-only"><h1>深夜許願星空</h1></main>
  <div id="offlineBadge" class="offline-badge hidden">離線可用</div>
  <div id="toast" class="toast hidden" role="status"></div>
  <div class="hint">點一下夜空，讓流星接住此刻的心情</div>

  <section id="wishPanel" class="wish-panel" aria-hidden="true">
    <h2>此刻你想放下或許下什麼？</h2>
    <p>選一種心情，寫一句話。它會成為你今晚的星星。</p>
    <div class="mood-row" id="moodRow" aria-label="心情選擇"></div>
    <input id="wishInput" class="wish-input" maxlength="88" placeholder="例如：願明天的我更輕盈一點" autocomplete="off" />
    <div class="panel-actions">
      <button id="submitWish" class="submit-btn" type="button">送出</button>
      <button id="cancelWish" class="ghost-btn" type="button">先不寫</button>
    </div>
  </section>

  <aside id="journalPanel" class="side-panel" aria-hidden="true">
    <div class="panel-head"><h2>星空日記</h2><button id="closeJournal" class="icon-btn" type="button">×</button></div>
    <nav class="tabs" aria-label="星空日記分頁">
      <button class="tab active" data-tab="stats" type="button">統計</button>
      <button class="tab" data-tab="calendar" type="button">月曆</button>
      <button class="tab" data-tab="achievements" type="button">成就</button>
      <button class="tab" data-tab="backup" type="button">備份</button>
    </nav>
    <section id="tab-stats" class="tab-page show"></section>
    <section id="tab-calendar" class="tab-page"></section>
    <section id="tab-achievements" class="tab-page"></section>
    <section id="tab-backup" class="tab-page">
      <div class="stat-card">
        <strong>換手機/備份</strong>
        <p>匯出 JSON 後，可以在另一台手機匯入，還原所有心願星星、心情與成就。</p>
        <button id="exportBtn" class="wide ghost-btn" type="button">匯出星空日記 JSON</button>
        <label class="wide import-label">匯入 JSON<input id="importInput" type="file" accept="application/json,.json" hidden /></label>
      </div>
      <button id="clearBtn" class="wide danger-btn" type="button">清空這台裝置的星空</button>
    </section>
  </aside>

  <section id="breathOverlay" class="breath-overlay hidden" aria-hidden="true">
    <div class="breath-orb"><span id="breathText">吸氣</span></div>
    <p id="breathCount">4</p>
    <small>4 秒吸氣・4 秒停留・6 秒吐氣，跟著光慢慢來</small>
  </section>

  <section id="storyCard" class="story-card hidden" aria-hidden="true">
    <button id="closeStory" class="icon-btn" type="button">×</button>
    <h2>你的星座故事</h2>
    <p id="storyText"></p>
  </section>

  <div id="wishTooltip" class="wish-tooltip"></div>
  <script src="app.js" defer></script>
</body>
</html>
